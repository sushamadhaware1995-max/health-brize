<main>
    <div class="modal-content">
        <div class="modal-title">
            <h2>{{title}}</h2>
            <mat-icon class="close_icon" (click)="closeDialog(false)">close</mat-icon>
        </div>
        <app-loader [isLoading]="isLoading"></app-loader>
        <form  [formGroup]="userForm" (ngSubmit)="onSubmit(userForm.value)" class="modal-body">
            <div class="input-fields-container">
                <div class="row">
                    <fieldset>
                        <legend>User Details:</legend>
                        <div class="input-fields-wrapper">
                            <div class="input-field">
                                <label for="name">Assign Role</label>
                                <select formControlName="role">
                                    <option *ngFor="let role of roles" [value]="role.value">{{role.displayName}}</option>
                                </select>
                            </div>
                            <div class="input-field">
                                <label for="name">Name</label>
                                <input type="text" placeholder="Enter name" formControlName="name" id="name">
                            </div>
                            <div class="input-field">
                                <label for="phone">Phone</label>
                                <input type="text" placeholder="Enter Mobile number" formControlName="phone" id="phone" maxlength="10" required>
                            </div>
                            <div class="input-field">
                                <label for="email">Email ID</label>
                                <input type="email" id="email" placeholder="Enter email address" formControlName="email" required>
                            </div>
                            <div class="input-field">
                                <label for="address">Address</label>
                                <input type="text" placeholder="Enter Address" formControlName="address" id="address">
                            </div>
                            <div class="input-field">
                                <label for="pincode">Pincode</label>
                                <input type="number" placeholder="Enter pincode" formControlName="pincode" id="pincode">
                            </div>
                            <div class="input-field">
                                <label for="city">City</label>
                                <input type="text" placeholder="Enter city" formControlName="city" id="city">
                            </div>
                            <div class="input-field">
                                <label for="state">State</label>
                                <input type="text" placeholder="Enter state" formControlName="state" id="state">
                            </div>
                            <div class="input-field">
                                <label for="country">Country</label>
                                <input type="text" placeholder="Enter country" formControlName="country" id="country">
                            </div>
                        </div>
                    </fieldset>
                </div>
            </div>
            <div class="action-buttons" >
                <button class="btn btn-secondary" type="button" (click)="closeDialog(false)">{{cancelButtonText}}</button>
                <button *ngIf="!currentAction" class="btn btn-primary" type="submit">{{submitButtonText}}</button>
            </div>
        </form>
    </div>
  </main>
